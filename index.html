            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/D.jpg", opts: ["Heatsink (ฮีท ซิงค์)", "Transformer (ทรานฟอเมอร์)", "Buzzer (บัชเซอร์)", "Switch (สวิทซ์)"], a: 2 },

            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/F.jpg", opts: ["Chip Resistor (ชิบ รีซีสเตอร์)", "Chip Capacitor (ชิบ คาปาซิเตอร์)", "Inductor (ชิบ อินดัคเตอร์)", "Diode (ซีเนอร์ ไดโอด)"], a: 0 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/G.jpg", opts: ["Connector (คอนเนกเตอร์)", "Heat Sink (ฮีท ซิงค์)", "Transformer (ทรานฟอเมอร์)", "Crystal (คริสตอล)"], a: 1 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/H.jpg", opts: ["Resistor (รีซีสเตอร์)", "Capacitor (คาปาซิเตอร์)", "Crystal (คริสตอล)", "LED (หลอดเอลอีดี)"], a: 2 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/I.jpg", opts: ["Chip Capacitor (ชิบ คาปาซิเตอร์)", "Chip Resistor (ชิบ รีซีสเตอร์)", "Tantalum Capacitor (แทนทาลัม คาปาซิเตอร์)", "Inductor (ชิบ อินดัคเตอร์)"], a: 0 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/J.jpg", opts: ["Switch (สวิทซ์)", "Transformer (ทรานฟอเมอร์)", "Buzzer (บัชเซอร์)", "Connector (คอนเนกเตอร์)"], a: 1 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/K.jpg", opts: ["Electrolytic Capacitor", "Tantalum Capacitor (แทนทาลัม คาปาซิเตอร์)", "Ceramic Capacitor", "Resistor"], a: 1 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/L.jpg", opts: ["Switch (สวิทซ์)", "Connector (คอนเนกเตอร์)", "Socket (ซ็อกเก็ต)", "Terminal (เทอร์มินอล)"], a: 0 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/M.jpg", opts: ["Diode", "Transistor (ทรานซิสเตอร์)", "IC", "Regulator"], a: 1 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/N.jpg", opts: ["Switch (สวิทซ์)", "Connector (คอนเนกเตอร์)", "Header (เฮดเดอร์)", "Pin (พิน)"], a: 1 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/O.jpg", opts: ["Resistor (รีซีสเตอร์)", "Diode (ไดโอด)", "Inductor (ชิบ อินดัคเตอร์)", "Fuse (ฟิวส์)"], a: 0 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/P.jpg", opts: ["light (ไลท์)", "Neon (นีออน)", "LED (หลอดเอลอีดี)", "Display (ดีสเพลย์)"], a: 2 },
            { t: "จากรูปภาพ คืออุปกรณ์ชนิดใด?", img: "images/Q.jpg", opts: ["PCB (พีซีบี)", "Wafer (เวเฟอร์)", "Panel (พาเนล)", "Sheet (ซีส)"], a: 0 }
        ];

        let db, auth, currentStudent = null, studentCache = null, isFetching = false;
        let configRef, studentsRef, studentQuestions = [], studentAnswersMap = {}, currentQIndex = 0;
        let studentOptionOrders = {}, allResults = [];

        // Define updateLog in the script scope
        function updateLog(msg) {
            const el = document.getElementById('loading-log');
            if (el) el.innerText = msg;
        }

        // Define hideLoadingForce in the window scope for the button to access it
        window.hideLoadingForce = () => {
            document.getElementById('loading-overlay').style.display = 'none';
        };

        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                configRef = doc(db, 'bec_config_v11', 'main'); 
                studentsRef = collection(db, 'bec_students_v11');

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        updateLog("เชื่อมต่อสำเร็จ!");
                        window.hideLoadingForce();
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch(e) { 
                const diag = document.getElementById('diagnostic-box');
                const diagTxt = document.getElementById('diagnostic-text');
                if (diag) diag.classList.remove('hidden');
                if (diagTxt) diagTxt.innerText = "Firebase Error: " + e.message;
            }
        }

        const show = (id) => {
            document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
            const el = document.getElementById(id);
            if(id === 'page-student-exam' || id === 'page-home') el.style.display = 'flex';
            else el.style.display = 'block';
        };

        // --- GOOGLE SHEETS HELPER ---
        async function fetchStudents() { 
            if (studentCache) return studentCache;
            if (isFetching) return [];
            isFetching = true;
            try {
                updateLog("กำลังดึงรายชื่อพนักงานจาก Google Sheet...");
                const res = await fetch(SHEET_URL + "&t=" + Date.now()); 
                if (!res.ok) throw new Error("ไม่สามารถอ่านไฟล์จาก Google Sheet ได้");
                const csv = await res.text(); 
                return new Promise((resolve) => {
                    Papa.parse(csv, {
                        header: true, skipEmptyLines: true, 
                        complete: (results) => {
                            const rawData = results.data;
                            const normalized = rawData.map(row => {
                                const newRow = {};
                                Object.keys(row).forEach(key => {
                                    const cleanKey = key.trim().replace(/\s+/g, '');
                                    newRow[cleanKey] = row[key];
                                });
                                return newRow;
                            });
                            
                            if(normalized.length > 0) {
                                console.log("Headers Found:", Object.keys(normalized[0]));
                                const diag = document.getElementById('diagnostic-box');
                                const diagTxt = document.getElementById('diagnostic-text');
                                if (diag) diag.classList.remove('hidden');
                                if (diagTxt) diagTxt.innerText = `อ่านรายชื่อสำเร็จ: ${normalized.length} แถว\nคอลัมน์ที่พบ: ${Object.keys(normalized[0]).join(', ')}`;
                            }

                            studentCache = normalized;
                            isFetching = false;
                            updateLog("พร้อมใช้งาน");
                            resolve(normalized);
                        }
                    });
                });
            } catch (err) {
                isFetching = false;
                alert("เกิดข้อผิดพลาดในการโหลดรายชื่อ: " + err.message);
                return [];
            }
        }

        // --- TEACHER SYSTEM ---
        function initTeacherDashboard() {
            const thead = document.querySelector('thead #grid-header-row');
            thead.innerHTML = `<th class="p-3 border-b w-12 text-center bg-slate-50 sticky left-0 z-20">#</th><th class="p-3 border-b w-24 text-center bg-slate-50 sticky left-12 z-20">รหัส</th><th class="p-3 border-b min-w-[200px] bg-slate-50 sticky left-[144px] z-20 border-r">ชื่อ-สกุล</th><th class="p-3 border-b w-24 text-center bg-slate-50">สถานะ</th><th class="p-3 border-b w-20 text-center bg-slate-50 text-sky-700 font-bold">%</th>`;
            MASTER_QUESTIONS.forEach((_, i) => {
                const th = document.createElement('th');
                th.className = "p-2 border-b text-center w-12 font-bold text-slate-400 text-xs";
                th.innerText = i + 1; thead.appendChild(th);
            });

            onSnapshot(configRef, (snap) => {
                const isOpen = snap.exists() ? snap.data().isOpen : false;
                const btn = document.getElementById('btn-toggle-system');
                btn.innerHTML = isOpen ? `<i class="fa-solid fa-pause"></i> ปิดระบบ` : `<i class="fa-solid fa-play"></i> เปิดระบบ`;
                btn.className = isOpen ? "px-6 py-2.5 rounded-xl text-white font-bold bg-amber-500" : "px-6 py-2.5 rounded-xl text-white font-bold bg-emerald-500";
                btn.onclick = async () => {
                    const status = !isOpen;
                    await setDoc(configRef, { isOpen: status }, { merge: true });
                };
                document.getElementById('txt-system-status').innerText = isOpen ? 'ระบบเปิดอยู่' : 'ระบบปิดอยู่';
            });

            onSnapshot(query(studentsRef), (snap) => {
                allResults = []; 
                snap.forEach(d => allResults.push(d.data()));
                renderGrid();
            });
            
            document.getElementById('toggle-answers').onchange = () => renderGrid();
            document.getElementById('toggle-names').onchange = () => renderGrid();
        }

        function renderGrid() {
            const showNames = document.getElementById('toggle-names').checked;
            const showAnswers = document.getElementById('toggle-answers').checked;
            const tbody = document.getElementById('grid-body'); 
            tbody.innerHTML = '';
            document.getElementById('student-count').innerText = allResults.length;
            
            allResults.sort((a,b) => (b.status === 'submitted' ? 1 : 0) - (a.status === 'submitted' ? 1 : 0));
            
            allResults.forEach((s, i) => {
                const tr = document.createElement('tr'); 
                tr.className = "hover:bg-slate-50 border-b group";
                
                let html = `
                    <td class="p-3 text-center text-slate-400 text-xs sticky left-0 bg-white group-hover:bg-slate-50 z-10">${i+1}</td>
                    <td class="p-3 text-center text-slate-600 font-mono text-xs sticky left-12 bg-white group-hover:bg-slate-50 z-10">${s.studentId}</td>
                    <td class="p-3 whitespace-nowrap sticky left-[144px] bg-white group-hover:bg-slate-50 z-10 border-r">
                        <div class="text-slate-700 font-medium text-sm">${showNames ? s.name : '***'}</div>
                        <div class="text-[10px] text-slate-400">${s.dept || '-'}</div>
                    </td>
                    <td class="p-3 text-center">
                        ${s.status === 'submitted' ? '<span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[10px] font-bold">ส่งแล้ว</span>' : '<span class="bg-sky-100 text-sky-700 px-2 py-0.5 rounded text-[10px] font-bold">กำลังทำ</span>'}
                    </td>
                    <td class="p-3 text-center font-bold text-slate-700 text-sm">
                        ${s.score !== null ? Math.round(s.score)+'%' : '-'}
                    </td>
                `;

                s.answers.forEach((ansIdx, idx) => {
                    let cellCls = "w-6 h-6 rounded mx-auto flex items-center justify-center text-[10px] font-bold ";
                    let txt = (ansIdx === null) ? "•" : "";
                    if (ansIdx !== null) { 
                        if(showAnswers) { 
                            const isC = (ansIdx === MASTER_QUESTIONS[idx].a); 
                            cellCls += isC ? "bg-emerald-500 text-white" : "bg-red-500 text-white"; 
                            txt = isC ? "✓" : "✕"; 
                        } else { cellCls += "bg-sky-500 text-white"; txt = "A"; }
                    } else cellCls += "bg-slate-100 text-slate-300";
                    html += `<td class="p-1"><div class="${cellCls}">${txt}</div></td>`;
                });
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        // --- STUDENT SYSTEM ---
        document.getElementById('student-id').addEventListener('input', async (e) => { 
            const id = e.target.value.trim(); 
            if (id.length < 3) { document.getElementById('student-preview').classList.add('hidden'); return; }
            const list = await fetchStudents(); 
            const s = list.find(x => (x['รหัสประจำตัว'] || x['รหัส'] || x['EmployeeID']) == id); 
            if (s) { 
                const fullName = (s['ชื่อ'] || "") + " " + (s['นามสกุล'] || "");
                document.getElementById('preview-name').innerText = fullName; 
                document.getElementById('preview-dept').innerText = s['แผนก'] || ""; 
                document.getElementById('student-preview').classList.remove('hidden'); 
            } else {
                document.getElementById('student-preview').classList.add('hidden'); 
            }
        });

        document.getElementById('btn-student-login').onclick = async () => {
            const id = document.getElementById('student-id').value.trim();
            if (!id) return alert("กรุณากรอกรหัสพนักงาน");
            
            const conf = await getDoc(configRef); 
            if (!conf.exists() || !conf.data().isOpen) return alert("❌ ขณะนี้ระบบยังไม่เปิดรับคำตอบ");

            const list = await fetchStudents(); 
            const s = list.find(x => (x['รหัสประจำตัว'] || x['รหัส'] || x['EmployeeID']) == id); 
            if (!s) return alert("❌ ไม่พบข้อมูลพนักงานรหัสนี้ กรุณาตรวจสอบรหัสอีกครั้ง");

            currentStudent = { 
                id: (s['รหัสประจำตัว'] || s['รหัส'] || s['EmployeeID']), 
                name: (s['ชื่อ'] || "") + " " + (s['นามสกุล'] || ""), 
                dept: s['แผนก'] || "", 
                startTime: Date.now() 
            };
            
            const existing = await getDoc(doc(studentsRef, currentStudent.id));
            if (existing.exists() && existing.data().status === 'submitted') return alert("⚠️ คุณได้ส่งคำตอบไปแล้ว");
            
            if (!existing.exists()) { 
                await setDoc(doc(studentsRef, currentStudent.id), { 
                    studentId: currentStudent.id, name: currentStudent.name, dept: currentStudent.dept, 
                    status: 'online', score: null, answers: new Array(40).fill(null) 
                }); 
            } else {
                const saved = existing.data().answers;
                saved.forEach((v, idx) => { if(v !== null) studentAnswersMap[idx] = v; });
            }

            studentQuestions = MASTER_QUESTIONS.map((q, i) => ({...q, originalIndex: i})).sort(() => Math.random() - 0.5);
            studentOptionOrders = {}; 
            studentQuestions.forEach(q => studentOptionOrders[q.originalIndex] = [0,1,2,3].sort(() => Math.random() - 0.5));
            
            document.getElementById('exam-student-name').innerText = currentStudent.name;
            document.getElementById('exam-student-dept').innerText = currentStudent.dept;
            renderQuestion();
            show('page-student-exam');
        };

        function renderQuestion() {
            const q = studentQuestions[currentQIndex];
            document.getElementById('q-current').innerText = currentQIndex + 1;
            document.getElementById('question-text').innerText = q.t;
            document.getElementById('progress-bar').style.width = `${((currentQIndex + 1) / 40) * 100}%`;
            
            const imgC = document.getElementById('question-image-container');
            if (q.img) {
                imgC.classList.remove('hidden');
                document.getElementById('question-image').src = q.img;
            } else imgC.classList.add('hidden');
            
            const optsC = document.getElementById('options-container');
            optsC.innerHTML = '';
            studentOptionOrders[q.originalIndex].forEach((origIdx, i) => {
                const isS = studentAnswersMap[q.originalIndex] === origIdx;
                optsC.innerHTML += `
                    <div onclick="window.selectAnswer(${origIdx})" class="p-4 border-2 rounded-xl cursor-pointer flex items-center gap-4 ${isS ? 'border-sky-500 bg-sky-50' : 'border-slate-100 hover:bg-slate-50'}">
                        <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold ${isS ? 'bg-sky-500 border-sky-500 text-white' : 'text-slate-400'}">${String.fromCharCode(65+i)}</div>
                        <span class="text-lg font-medium text-slate-700">${q.opts[origIdx]}</span>
                    </div>`;
            });
            document.getElementById('btn-prev').disabled = (currentQIndex === 0);
            document.getElementById('btn-next').classList.toggle('hidden', currentQIndex === 39);
            document.getElementById('btn-submit').classList.toggle('hidden', currentQIndex !== 39);
        }

        window.selectAnswer = async (val) => {
            const q = studentQuestions[currentQIndex];
            studentAnswersMap[q.originalIndex] = val;
            renderQuestion();
            const arr = new Array(40).fill(null);
            Object.keys(studentAnswersMap).forEach(k => arr[k] = studentAnswersMap[k]);
            await updateDoc(doc(studentsRef, currentStudent.id), { answers: arr });
        };

        document.getElementById('btn-next').onclick = () => {
            if (studentAnswersMap[studentQuestions[currentQIndex].originalIndex] === undefined) return alert("กรุณาเลือกคำตอบ");
            currentQIndex++; renderQuestion();
        };

        document.getElementById('btn-prev').onclick = () => {
            if (currentQIndex > 0) { currentQIndex--; renderQuestion(); }
        };

        document.getElementById('btn-submit').onclick = async () => {
            if (!confirm("ยืนยันส่งคำตอบ?")) return;
            let correct = 0;
            MASTER_QUESTIONS.forEach((q, i) => { if(studentAnswersMap[i] === q.a) correct++; });
            await updateDoc(doc(studentsRef, currentStudent.id), { 
                status: 'submitted', score: (correct/40)*100,
                timeTaken: (Date.now() - currentStudent.startTime)/1000
            });
            show('page-submitted');
        };

        document.getElementById('btn-dl-excel').onclick = () => {
            const data = allResults.map((s, i) => {
                const row = { "ลำดับ": i+1, "รหัส": s.studentId, "ชื่อ": s.name, "คะแนน(%)": s.score };
                s.answers.forEach((ans, idx) => { row[`ข้อ ${idx+1}`] = (ans === MASTER_QUESTIONS[idx].a) ? "ถูก" : "ผิด/ไม่ตอบ"; });
                return row;
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Results");
            XLSX.writeFile(wb, "Electronics_Results.xlsx");
        };

        document.getElementById('btn-teacher-login').onclick = () => {
            if(document.getElementById('teacher-room-code').value === TEACHER_CODE) {
                show('page-teacher-dashboard'); initTeacherDashboard();
            } else alert("รหัสผ่านไม่ถูกต้อง");
        };

        document.getElementById('btn-go-teacher').onclick = () => show('page-teacher-login');
        document.getElementById('btn-go-student').onclick = () => show('page-student-login');
        
        // Add click listener for force skip button
        document.getElementById('btn-force-skip').onclick = () => window.hideLoadingForce();

        init();
    </script>
</body>
</html>
